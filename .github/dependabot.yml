version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Tashkent"
    open-pull-requests-limit: 5
    groups:
      react:
        patterns:
          - "react*"
          - "@types/react*"
      vite:
        patterns:
          - "vite*"
          - "@vitejs/*"

  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Tashkent"
    open-pull-requests-limit: 5
    groups:
      express:
        patterns:
          - "express*"
          - "body-parser"
          - "cors"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
